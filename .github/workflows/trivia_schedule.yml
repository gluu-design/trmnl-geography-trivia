name: Generate Daily Geo Loop Data

on:
  schedule:
    # 6:00 AM EDT -> 10:00 UTC
    - cron: '0 10 * * *'
    # 6:00 PM EDT -> 22:00 UTC
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai pillow

      - name: Run Trivia Generator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python trmnl_trivia.py

      - name: Commit Updated Data & History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json history.json image.png || true
          git diff --quiet && git diff --staged --quiet || (git commit -m "auto: update Geo Loop trivia feed" && git push)
