name: Generate Daily Geo Loop Data

on:
  schedule:
    # Runs twice a day (e.g., 6:00 AM and 6:00 PM UTC)
    # The script handles whether to show/hide the answer.
    - cron: '0 6,18 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write # Crucial: Allows the runner to commit files back

jobs:
  update-geo-loop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Get full history to prevent commit conflicts when updating json files
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-generativeai

      - name: Run GEO LOOP Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python trmnl_trivia.py

      # PERSISTENCE: If history.json or data.json changed, commit and push them back.
      - name: Commit and Push Updated Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add history.json data.json
          # Check if there are actually changes before committing to avoid errors
          if ! git diff --cached --exit-code; then
            git commit -m "Automated update: data.json and history.json"
            git push
          else
            echo "No data changes detected."
          fi
