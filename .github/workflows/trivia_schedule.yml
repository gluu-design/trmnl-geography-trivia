name: TRMNL Daily Geography Trivia

on:
  schedule:
    # Runs at ~6:00 AM EDT (10:00 UTC) and ~6:00 PM EDT (22:00 UTC)
    - cron: '0 10,22 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  run-trivia:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -U google-genai requests pytz

      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TRMNL_WEBHOOK_URL: ${{ secrets.TRMNL_WEBHOOK_URL }}
        run: python trmnl_trivia.py
