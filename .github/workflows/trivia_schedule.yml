name: TRMNL Daily Geography Trivia

on:
  schedule:
    # Runs twice a day: ~8:00 AM EST (12:00 UTC) and ~6:00 PM EST (22:00 UTC)
    - cron: '0 12,22 * * *'
  workflow_dispatch: # Allows manual testing

jobs:
  run-trivia:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install required libraries
        run: pip install langchain-google-genai requests

      - name: Run Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TRMNL_WEBHOOK_URL: ${{ secrets.TRMNL_WEBHOOK_URL }}
        run: python trmnl_trivia.py
